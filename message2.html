<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guidance Détaillée - Ton Message Caché</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            color: #e0e0e0;
            font-family: 'Lora', serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { max-width: 700px; width: 100%; }

        h1 { font-family: 'Cinzel', serif; font-size: 1.6em; letter-spacing: 3px; color: gold; margin-bottom: 40px; text-transform: uppercase; }

        /* Écran de départ obligatoire pour le SON */
        #start-screen { 
            margin-top: 100px; 
            padding: 40px; 
            border: 1px solid rgba(255,215,0,0.2); 
            border-radius: 50%; 
            width: 250px; 
            height: 250px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.5s; 
            margin: 100px auto; 
        }
        #start-screen:hover { border-color: gold; box-shadow: 0 0 30px rgba(255,215,0,0.2); }

        .orb-glow { width: 80px; height: 80px; background: gold; border-radius: 50%; filter: blur(20px); opacity: 0.5; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.2); opacity: 0.8; } }

        /* Fenêtre de résultat arrondie */
        #result {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid gold; 
            padding: 50px 30px;
            border-radius: 20px; /* BORDURE ARRONDIE ICI */
            box-shadow: 0 0 40px rgba(218, 165, 32, 0.2);
            text-align: justify;
            line-height: 1.8;
            font-size: 1.1em;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #loading-screen { display: none; margin-top: 100px; }

        button { 
            background: gold; 
            color: black; 
            border: none; 
            padding: 15px 30px; 
            font-family: 'Cinzel'; 
            font-weight: bold; 
            border-radius: 50px; /* Bouton arrondi aussi */
            margin-top: 30px; 
            cursor: pointer; 
            width: 100%; 
            transition: 0.3s;
        }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>

    <audio id="audioPlayer">
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="start-screen" onclick="lancerGuidance()">
            <div class="orb-glow"></div>
            <p style="font-family: 'Cinzel'; font-size: 0.8em; margin-top: 20px; color: gold;">ACTIVER MON<br>ANALYSE</p>
        </div>

        <div id="loading-screen">
            <h2 id="status" style="font-family: 'Cinzel'; color: white;">Connexion spirituelle...</h2>
            <div style="width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 20px;">
                <div id="bar" style="width: 0%; height: 100%; background: gold; transition: 5s linear;"></div>
            </div>
        </div>

        <div id="result">
            <h2 style="font-family: 'Cinzel'; color: gold; text-align: center; margin-top: 0;">Ta Guidance Détaillée</h2>
            <div id="text-container"></div>
            <button onclick="window.print()">Sauvegarder mon message</button>
        </div>
    </div>

    <script>
        const mesMessages = [
            "Tu traverses actuellement une période où plusieurs éléments de ta vie semblent se mélanger, créant une confusion intérieure qui t’empêche de voir clairement la direction à prendre. Ce n’est pas un blocage définitif, mais une phase de réajustement mental et émotionnel.",
            "Une situation passée continue d’influencer inconsciemment tes choix actuels. Même si tu penses être passé à autre chose, certaines émotions n’ont pas encore été totalement intégrées, ce qui crée une forme de répétition dans tes expériences.",
            "Ce que tu ressens en ce moment n’est pas à ignorer. Il s’agit d’un signal intérieur qui t’indique que quelque chose doit être observé plus attentivement avant de prendre une décision importante.",
            "Tu es dans une phase où ton esprit cherche des réponses rapides, mais les véritables réponses demandent du recul et de la patience. Forcer les choses actuellement pourrait créer encore plus de confusion.",
            "Il existe en toi une tension entre ce que tu veux consciemment et ce que tu ressens profondément. Cette différence crée une forme d’instabilité intérieure qu’il est important de comprendre plutôt que de combattre.",
            "Une vérité que tu évites de regarder directement commence à se manifester de plus en plus clairement dans ton quotidien.",
            "Une transformation discrète mais profonde est déjà en cours dans ta manière de penser. Tu dois accepter que certaines réponses ne sont pas encore disponibles pour toi maintenant.",
            "La réponse que tu cherches viendra plus facilement lorsque tu arrêteras de la forcer mentalement. Tu es plus proche d'une prise de conscience importante que tu ne le réalises."
        ];

        function lancerGuidance() {
            const son = document.getElementById("audioPlayer");
            son.play();
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("loading-screen").style.display = "block";
            setTimeout(() => { document.getElementById("bar").style.width = "100%"; }, 100);
            setTimeout(afficherResultat, 5000);
        }

        function afficherResultat() {
            document.getElementById("loading-screen").style.display = "none";
            document.getElementById("result").style.display = "block";

            let m1 = mesMessages[Math.floor(Math.random() * mesMessages.length)];
            let m2 = mesMessages[Math.floor(Math.random() * mesMessages.length)];
            while(m1 === m2) { m2 = mesMessages[Math.floor(Math.random() * mesMessages.length)]; }

            const texteFinal = m1 + "<br><br>" + m2;
            
            let i = 0;
            const container = document.getElementById("text-container");
            function typewriter() {
                if (i < texteFinal.length) {
                    if (texteFinal.substr(i, 4) === "<br>") {
                        container.innerHTML += "<br>";
                        i += 4;
                    } else {
                        container.innerHTML += texteFinal.charAt(i);
                        i++;
                    }
                    setTimeout(typewriter, 30);
                }
            }
            typewriter();
        }
    </script>
</body>
</html>
